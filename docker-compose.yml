name: booking-order-app # change this to your app name
services:
  user-service:
    container_name: user-service
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
